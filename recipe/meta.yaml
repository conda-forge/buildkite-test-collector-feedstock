{% set name = "buildkite-test-collector" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 2ddc602902762830975001d1d87ebb6d5311f836c0161ffd73eec60ce3b3b339

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.8
    - pip
  run:
    - python >=3.8
    - requests >=2
    - pytest >=7

test:
  imports:
    - buildkite_test_collector
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/buildkite/test-collector-python
  summary: Buildkite Test Analytics collector
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - bstadlbauer
